          stand_age: 60.0
          aspect: 315.0
          slope: 30.0
          elevation: 7.0
      - SITECODE:
          site_species: 63
          site_index: "60."
      - INVYEAR:
          year: 1990.0
      - NUMCYCLE:
          cycles: 6.0
  - output:
      - keyword: "ECHOSUM"
  - treatments:
      - THINBBA:
          year: 2010.0
          residual_basal_area: 80.0
  - setup:
      - keyword: "TREEDATA"
      - keyword: "PROCESS"
  - other:
