# Semantic stand format (format: fvs-stand/v1) — a stand described by INTENT, not by
# mirroring the .key keyword stream. The converter unravels this into keyword records
# in the canonical FVS order. Full field→keyword reference: docs/FORMATS.md.
#
# Run it directly (the engine reads YAML), or unravel to .key for stock FVS:
#   julia --project bin/fvsjl-translate.jl examples/semantic/thinsdi.yaml out.key
#
# The inventory is loaded from the companion `thinsdi.tre` (same base name); a
# `thinsdi.csv` beside it would be used instead, with no TREEFMT needed.
format: fvs-stand/v1
stand:
  stdident: "SN THINSDI — thin to residual SDI 200 in 2010"
  noautoes: true
  design:   { plots: 11, nsc: 1 }
  stdinfo:  { forest: 80106, habitat: "231Dd", age: 60, aspect: 315, slope: 30, elev: 7 }
  sitecode: { species: 63, index: 60.0 }
  invyr:    1990
  numcycle: 6
  echosum:  true
  treatments:
    - thinsdi: { year: 2010, sdi: 200 }
  treelist:
    format: "(T24,I4,T1,I4,T31,F2.0,I1,A3,F3.1,F2.1,T45,F3.0,T63,F3.0,T60,F3.1,T48,I1,T52,I2,T66,5I1,T54,7I1,T75,F3.0)"
